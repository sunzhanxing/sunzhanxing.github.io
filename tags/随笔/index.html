<blockquote>
<p>距离 2016 年结束还有不足一周的时间，抽出时间写一下 2016 年的过往，发现这一年无论是生活还是工作以及个人方面变化都是蛮大的。回顾 2016 的年初制定的目标，不免有些觉得时间如流水。今年于我来说，注定是不平凡的一年。随着距离毕业的日子将至，那种想记录的东西也日渐暴露出来。于是乎就有了这份“2016年终总结”。</p>
